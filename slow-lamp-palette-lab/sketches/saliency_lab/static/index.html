<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saliency Lab</title>
  <style>
    :root {
      --bg-primary:    #262624;
      --bg-secondary:  #1F1E1D;
      --bg-tertiary:   #30302E;
      --border:        #3A3937;
      --text-primary:  #F5F4ED;
      --text-secondary:#B5B3AC;
      --accent:        #D97757;
      --accent-hover:  #C25E3F;
      --placeholder:   #2C2B29;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      font-size: 13px;
    }

    /* ── Layout ──────────────────────────────────────────────────────────── */

    .shell {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 240px;
      flex-shrink: 0;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .main {
      flex: 1;
      min-width: 0;
      padding: 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */

    .sidebar-heading {
      margin: 0;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      font-variant: small-caps;
    }

    .param-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .param-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .param-label-row {
      display: flex;
      justify-content: space-between;
      color: var(--text-secondary);
    }

    .param-value { color: var(--text-primary); }

    /* ── Sliders ─────────────────────────────────────────────────────────── */

    input[type="range"] {
      width: 100%;
      appearance: none;
      background: transparent;
      height: 20px;
      margin: 0;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        var(--accent) var(--fill, 0%),
        var(--border) var(--fill, 0%)
      );
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: -6.5px;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    input[type="range"]::-moz-range-track {
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        var(--accent) var(--fill, 0%),
        var(--border) var(--fill, 0%)
      );
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    }

    /* ── Top bar ─────────────────────────────────────────────────────────── */

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .top-bar h1 {
      margin: 0;
      font-size: 24px;
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font: inherit;
    }

    .upload-btn:hover { background: var(--accent-hover); }

    .upload-btn input {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* ── View toggle ─────────────────────────────────────────────────────── */

    .view-toggle {
      display: flex;
      gap: 4px;
    }

    .view-btn {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      transition: border-color 0.1s, color 0.1s;
    }

    .view-btn:hover:not(.active) {
      border-color: var(--text-secondary);
      color: var(--text-primary);
    }

    .view-btn.active {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-color: var(--accent);
    }

    /* ── Image frame ─────────────────────────────────────────────────────── */

    .image-frame {
      flex: 1;
      min-height: 360px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .image-frame img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: none;
      border-radius: 10px;
    }

    .image-frame img.visible { display: block; }

    .frame-placeholder {
      color: var(--text-secondary);
    }

    /* ── Swatches ────────────────────────────────────────────────────────── */

    .swatches {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      border-radius: 14px;
      overflow: hidden;
      background: var(--bg-secondary);
    }

    .swatch-block { display: flex; flex-direction: column; }

    .swatch-color {
      height: 72px;
      background: var(--placeholder);
    }

    .swatch-label {
      padding: 10px 8px;
      text-align: center;
      color: var(--text-secondary);
    }

    /* ── Status ──────────────────────────────────────────────────────────── */

    .status {
      min-height: 1.2em;
      color: var(--text-secondary);
    }

    .status.error { color: #E07B6F; }
    .status.busy  { color: var(--text-secondary); }

    /* ── Sidebar divider ─────────────────────────────────────────────────── */

    .sidebar-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0;
    }

    /* ── Toggle switch ───────────────────────────────────────────────────── */

    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--text-secondary);
    }

    .switch {
      width: 32px;
      height: 18px;
      border-radius: 999px;
      border: none;
      background: var(--bg-tertiary);
      position: relative;
      cursor: pointer;
      padding: 2px;
      display: inline-flex;
      align-items: center;
      flex-shrink: 0;
    }

    .switch[aria-pressed="true"] { background: var(--accent); }

    .switch-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--text-primary);
      transition: transform 0.2s ease;
    }

    .switch[aria-pressed="true"] .switch-thumb {
      transform: translateX(14px);
    }

    /* ── Subtraction controls ────────────────────────────────────────────── */

    .sub-controls {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sub-controls.hidden { display: none; }

    .ref-upload-label {
      display: flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px dashed var(--border);
      cursor: pointer;
      color: var(--text-secondary);
      overflow: hidden;
      gap: 6px;
    }

    .ref-upload-label:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .ref-upload-label input {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    #refFileName {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- ── Sidebar ─────────────────────────────────────────────────────────── -->
  <aside class="sidebar">
    <h2 class="sidebar-heading">Parameters</h2>
    <div class="param-group">

      <div class="param-row">
        <div class="param-label-row">
          <span>Segments n</span>
          <span class="param-value" id="nSegmentsVal">300</span>
        </div>
        <input type="range" id="nSegments" min="50" max="600" step="1" value="300" />
      </div>

      <div class="param-row">
        <div class="param-label-row">
          <span>Spatial σ</span>
          <span class="param-value" id="spatialSigmaVal">0.40</span>
        </div>
        <input type="range" id="spatialSigma" min="0.1" max="1.0" step="0.05" value="0.4" />
      </div>

      <div class="param-row">
        <div class="param-label-row">
          <span>Colors k</span>
          <span class="param-value" id="kVal">5</span>
        </div>
        <input type="range" id="k" min="2" max="10" step="1" value="5" />
      </div>

      <div class="param-row">
        <div class="param-label-row">
          <span>Min spread</span>
          <span class="param-value" id="minSpreadVal">12</span>
        </div>
        <input type="range" id="minSpread" min="0" max="30" step="1" value="12" />
      </div>

    </div>

    <hr class="sidebar-divider" />

    <h2 class="sidebar-heading">Subtraction</h2>
    <div class="param-group">

      <div class="toggle-row">
        <span>Subtraction mode</span>
        <button type="button" class="switch" id="subToggle" aria-pressed="false">
          <span class="switch-thumb"></span>
        </button>
      </div>

      <div class="sub-controls hidden" id="subControls">
        <label class="ref-upload-label">
          <span id="refFileName">Choose reference…</span>
          <input type="file" accept="image/*" id="refInput" />
        </label>

        <div class="param-row">
          <div class="param-label-row">
            <span>Threshold</span>
            <span class="param-value" id="thresholdVal">13</span>
          </div>
          <input type="range" id="threshold" min="0" max="100" step="1" value="13" />
        </div>
      </div>

    </div>
  </aside>

  <!-- ── Main ────────────────────────────────────────────────────────────── -->
  <main class="main">

    <div class="top-bar">
      <h1>Saliency Lab</h1>
      <label class="upload-btn">
        Upload Image
        <input type="file" accept="image/*" id="imageInput" />
      </label>
    </div>

    <div class="view-toggle">
      <button class="view-btn active" data-view="original">Original</button>
      <button class="view-btn"        data-view="heatmap">Heatmap</button>
      <button class="view-btn"        data-view="segments">Segments</button>
      <button class="view-btn"        data-view="paletteInput">Palette input</button>
      <button class="view-btn" data-view="maskedHeatmap" id="btnMaskedHeatmap" style="display:none">Masked heatmap</button>
    </div>

    <div class="image-frame" id="imageFrame">
      <span class="frame-placeholder" id="placeholder">Upload an image to begin</span>
      <img id="imgOriginal"      alt="Original" />
      <img id="imgHeatmap"       alt="Heatmap" />
      <img id="imgSegments"      alt="Segments" />
      <img id="imgPaletteInput"  alt="Palette input" />
      <img id="imgMaskedHeatmap" alt="Masked heatmap" />
    </div>

    <div class="swatches" id="swatches"></div>

    <div class="status" id="status"></div>

  </main>
</div>

<script>
  // ── State ─────────────────────────────────────────────────────────────────

  let storedDataUrl    = null;   // main image as data URL
  let refDataUrl       = null;   // subtraction reference as data URL
  let lastResult       = null;   // most recent /api/process response
  let currentView      = "original";
  let debounceTimer    = null;
  let subtractionMode  = false;

  // maps view name → response key
  const VIEW_KEY = {
    original:      "original",
    heatmap:       "heatmap",
    segments:      "segments",
    paletteInput:  "palette_input",
    maskedHeatmap: "masked_heatmap",
  };

  // ── Slider config ─────────────────────────────────────────────────────────

  const sliders = {
    nSegments:   { el: document.getElementById("nSegments"),   valEl: document.getElementById("nSegmentsVal"),   min: 50,  max: 600, fmt: v => String(Math.round(v)) },
    spatialSigma:{ el: document.getElementById("spatialSigma"),valEl: document.getElementById("spatialSigmaVal"),min: 0.1, max: 1.0, fmt: v => parseFloat(v).toFixed(2) },
    k:           { el: document.getElementById("k"),           valEl: document.getElementById("kVal"),           min: 2,   max: 10,  fmt: v => String(Math.round(v)) },
    minSpread:   { el: document.getElementById("minSpread"),   valEl: document.getElementById("minSpreadVal"),   min: 0,   max: 30,  fmt: v => String(Math.round(v)) },
  };

  function refreshSlider(key) {
    const s   = sliders[key];
    const pct = ((s.el.value - s.min) / (s.max - s.min)) * 100;
    s.el.style.setProperty("--fill", `${pct}%`);
    s.valEl.textContent = s.fmt(s.el.value);
  }

  Object.keys(sliders).forEach(key => {
    refreshSlider(key);
    sliders[key].el.addEventListener("input", () => {
      refreshSlider(key);
      scheduleProcess();
    });
  });

  // ── View toggle ───────────────────────────────────────────────────────────

  document.querySelectorAll(".view-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".view-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentView = btn.dataset.view;
      showView();
    });
  });

  function showView() {
    if (!lastResult) return;
    Object.keys(VIEW_KEY).forEach(view => {
      const el   = document.getElementById("img" + view.charAt(0).toUpperCase() + view.slice(1));
      const data = lastResult[VIEW_KEY[view]];
      if (data) el.src = data;
      el.classList.toggle("visible", view === currentView && !!data);
    });
  }

  // ── Upload ────────────────────────────────────────────────────────────────

  document.getElementById("imageInput").addEventListener("change", event => {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      storedDataUrl = reader.result;
      process();
    };
    reader.readAsDataURL(file);
  });

  // ── Process ───────────────────────────────────────────────────────────────

  function scheduleProcess() {
    if (!storedDataUrl) return;
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(process, 200);
  }

  async function process() {
    if (!storedDataUrl) return;

    setStatus("Processing…", "busy");

    try {
      const blob = await fetch(storedDataUrl).then(r => r.blob());
      const form = new FormData();
      form.append("file",            blob, "image.png");
      form.append("n_segments",      sliders.nSegments.el.value);
      form.append("spatial_sigma",   sliders.spatialSigma.el.value);
      form.append("k",               sliders.k.el.value);
      form.append("min_spread_dist", sliders.minSpread.el.value);
      if (subtractionMode && refDataUrl) {
        const refBlob = await fetch(refDataUrl).then(r => r.blob());
        form.append("subtract_file", refBlob, "reference.png");
        form.append("threshold", document.getElementById("threshold").value);
      }

      const res  = await fetch("/api/process", { method: "POST", body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Request failed");

      lastResult = data;
      document.getElementById("placeholder").style.display = "none";
      showView();
      buildSwatches(data.palette);
      setStatus("");
    } catch (err) {
      setStatus(err.message, "error");
    }
  }

  // ── Swatches ──────────────────────────────────────────────────────────────

  function buildSwatches(palette) {
    const container = document.getElementById("swatches");
    container.innerHTML = "";
    palette.forEach(([r, g, b]) => {
      const block = document.createElement("div");
      block.className = "swatch-block";

      const color = document.createElement("div");
      color.className = "swatch-color";
      color.style.background = `rgb(${r},${g},${b})`;

      const label = document.createElement("div");
      label.className = "swatch-label";
      label.textContent = `${r} ${g} ${b}`;

      block.appendChild(color);
      block.appendChild(label);
      container.appendChild(block);
    });
  }

  // ── Subtraction toggle ────────────────────────────────────────────────────

  document.getElementById("subToggle").addEventListener("click", () => {
    subtractionMode = !subtractionMode;
    document.getElementById("subToggle").setAttribute("aria-pressed", String(subtractionMode));
    document.getElementById("subControls").classList.toggle("hidden", !subtractionMode);
    document.getElementById("btnMaskedHeatmap").style.display = subtractionMode ? "" : "none";
    if (!subtractionMode) {
      refDataUrl = null;
      document.getElementById("refFileName").textContent = "Choose reference…";
      document.getElementById("refInput").value = "";
      if (currentView === "maskedHeatmap") {
        currentView = "heatmap";
        document.querySelectorAll(".view-btn").forEach(b =>
          b.classList.toggle("active", b.dataset.view === "heatmap")
        );
      }
    }
    if (storedDataUrl) scheduleProcess();
  });

  // ── Reference image upload ────────────────────────────────────────────────

  document.getElementById("refInput").addEventListener("change", event => {
    const file = event.target.files[0];
    if (!file) return;
    document.getElementById("refFileName").textContent = file.name;
    const reader = new FileReader();
    reader.onload = () => {
      refDataUrl = reader.result;
      if (storedDataUrl) process();
    };
    reader.readAsDataURL(file);
  });

  // ── Threshold slider ──────────────────────────────────────────────────────

  (function () {
    const el    = document.getElementById("threshold");
    const valEl = document.getElementById("thresholdVal");
    const min = 0, max = 100;
    function refresh() {
      el.style.setProperty("--fill", `${((el.value - min) / (max - min)) * 100}%`);
      valEl.textContent = Math.round(el.value);
    }
    refresh();
    el.addEventListener("input", () => {
      refresh();
      if (subtractionMode && refDataUrl && storedDataUrl) scheduleProcess();
    });
  })();

  // ── Status ────────────────────────────────────────────────────────────────

  function setStatus(msg, type = "") {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className   = "status" + (type ? ` ${type}` : "");
  }
</script>
</body>
</html>
